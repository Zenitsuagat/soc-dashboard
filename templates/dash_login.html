<!DOCTYPE html>
<html>
<head>
    <title>SOC Admin Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .subtitle { color: #aaa; font-size: 13px; text-align: center; margin-bottom: 20px; }
        .shield   { font-size: 48px; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="shield">🛡️</div>
    <h2>SOC Dashboard Access</h2>
    <p class="subtitle">Restricted — Authorized personnel only</p>

    <form method="POST">
        <input type="text"     name="username" placeholder="Admin Username" required><br>
        <input type="password" name="password" placeholder="Admin Password"  required><br>
        <button type="submit">Enter Dashboard</button>
    </form>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}
</div>
</body>
</html>
